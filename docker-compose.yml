version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: always

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    depends_on:
      - redis
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    restart: always
    env_file:
      - .env
    depends_on:
      - backend

# Expose frontend to public
# Expose backend to public via its subdomain
